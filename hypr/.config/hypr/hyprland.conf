# matugen zone
source = colors.conf

################
### MONITORS ###
################
monitor = , 1920x1080@165, 0x0, auto
monitor = HDMI-A-1, 1920x1080@60, 0x1080, 1

workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:HDMI-A-1

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = $terminal -e spf
$menu = wofi --show drun
$editor = $terminal -e nvim
$browser = floorp
$clipboard = copyq toggle
$wlogout = wlogout -b 5

#################
### AUTOSTART ###
#################
exec-once = nm-applet --indicator
exec-once = awww-daemon
exec-once = fcitx5 -d
exec-once = quickshell
exec-once = hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = musicpresence
exec-once = hypridle
exec-once = pactl set-card-profile alsa_card.pci-0000_01_00.1 output:hdmi-stereo-extra1
exec-once = ~/.config/scripts/matugen-mpvpaper.sh
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpm reload
exec-once = gnome-keyring-daemon --start --components=secrets,ssh,pkcs11
exec-once = copyq --start-server

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_IM_MODULE, fcitx5
env = XMODIFIERS, @im=fcitx5
env = GTK_IM_MODULE, fcitx5
env = QT_QPA_PLATFORMTHEME,qt6ct

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 0
    gaps_out = 10
    border_size = 0
    col.active_border = $primary
    col.inactive_border = $outline
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 0.9
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 10
        passes = 3
        ignore_opacity = true
        new_optimizations = true
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = workspaces, 1, 1.94, almostLinear, fade
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive
bind = $mainMod, M, exec, $wlogout
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, E, exec, $editor
bind = $mainMod, F, togglefloating
bind = $mainMod, V, exec, $clipboard
bind = ALT, space, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod SHIFT, P, pin
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, S, exec, hyprshot -m region
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Z, exec, sh -c "/home/dot1245/.config/scripts/fuzzel-player.sh"
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, W, exec, /home/dot1245/.config/scripts/wallpaper.sh
bind = SUPER, TAB, hyprexpo:expo, toggle
bind = , XF86PowerOff, exec, $wlogout

# Focus and Move
bind = $mainMod, A, movefocus, l
bind = $mainMod, D, movefocus, r
bind = $mainMod, W, movefocus, u
bind = $mainMod, S, movefocus, d

bind = $mainMod SHIFT, A, movewindow, l
bind = $mainMod SHIFT, D, movewindow, r
bind = $mainMod SHIFT, W, movewindow, u
bind = $mainMod SHIFT, S, movewindow, d

# Workspaces (1-10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Utils
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# audio
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule {
    name = copyq-sidebar
    match:class = ^(com.github.hluk.copyq)$
    float = on
    size = 25% 50%
    move = 75% 50%
}

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
